<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>학습 — Aprende Español</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">

    <header class="page-header">
      <a id="back-to-chapters" href="chapters.html" class="back-btn">← 챕터 목록</a>
      <div class="header-center">
        <h1 id="lesson-title">학습</h1>
        <p id="lesson-subtitle"></p>
      </div>
      <div id="level-indicator" class="level-indicator-badge"></div>
    </header>

    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="vocab">📖 단어 <span class="es-small">Vocabulario</span></button>
      <button class="tab-btn" data-tab="grammar">📐 문법 <span class="es-small">Gramática</span></button>
      <button class="tab-btn" data-tab="dialogue">💬 대화 <span class="es-small">Diálogo</span></button>
      <button class="tab-btn" data-tab="exercises">✏️ 연습 <span class="es-small">Ejercicios</span></button>
    </nav>

    <main class="lesson-main">
      <section id="tab-vocab" class="tab-panel active">
        <div class="tab-intro">
          <h2>이번 챕터 핵심 단어</h2>
          <p class="tab-intro-sub">🔊 버튼을 눌러 스페인어 발음을 들어보세요</p>
        </div>
        <div id="vocab-list" class="vocab-list"></div>
      </section>
      <section id="tab-grammar" class="tab-panel">
        <div class="tab-intro">
          <h2>이번 챕터 문법</h2>
          <p class="tab-intro-sub">핵심 문법 포인트를 한국어로 설명합니다</p>
        </div>
        <div id="grammar-list" class="grammar-list"></div>
      </section>
      <section id="tab-dialogue" class="tab-panel">
        <div class="tab-intro">
          <h2>실전 대화</h2>
          <p class="tab-intro-sub">🔊 버튼으로 각 문장의 발음을 들어보세요</p>
        </div>
        <div id="dialogue-box" class="dialogue-box"></div>
      </section>
      <section id="tab-exercises" class="tab-panel">
        <div class="tab-intro">
          <h2>연습 문제</h2>
          <p class="tab-intro-sub">배운 내용을 확인해 보세요</p>
        </div>
        <div id="exercises-list" class="exercises-list"></div>
      </section>
    </main>

    <nav class="chapter-nav">
      <button id="prev-chapter" class="nav-btn" onclick="navigateChapter(-1)">← 이전 챕터</button>
      <a id="chapters-link" href="chapters.html" class="nav-btn nav-btn-center">챕터 목록</a>
      <button id="next-chapter" class="nav-btn" onclick="navigateChapter(1)">다음 챕터 →</button>
    </nav>

    <footer class="footer">
      <p>Based on the <em>Gente</em> textbook series</p>
    </footer>
  </div>

<script src="js/content.js"></script>
<script src="js/app.js"></script>
</body>
</html>
